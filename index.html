<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> TaskFlow </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
        <header>
           <h1>TaskFlow</h1>
        </header>
    <main>
        <div id="tasks-section">
             <section id="controls">
                <input type="text" id="search-input" placeholder="Buscar tarea..." oninput="renderTasks(this.value)">
                
                <div class="filter-buttons">
                    <button onclick="currentFilter='all'; updateApp()">Todas</button>
                    <button onclick="currentFilter='pending'; updateApp()">Pendientes</button>
                    <button onclick="currentFilter='completed'; updateApp()">Completadas</button>
                </div>

                <div class="global-actions">
                <button type="button" onclick="completeAll()" class="btn-all">Marcar todas</button>
                <button type="button" onclick="clearCompleted()" class="btn-clear">Limpiar completadas</button>
            </div>
            </section>

            <section id="add-task">
                <h2>Gestión de Tareas</h2>
                <form id="task-form">
                    <label for="task-input">Nueva tarea:</label>
                    <input type="text" id="task-input" placeholder="Escribe aqui" required>
                    <button type="submit">Añadir Tarea</button>
                </form>
            </section>

            <section id="tasks-container">
                <h3>Lista de Tareas</h3>
                <ul id="task-list">
                </ul>
            </section>
        </div>
        <aside>
                <h2> </h2>
                <div>
                    <p>Total: <span id="stat-total">0</span></p>
                    <p>Completadas: <span id="stat-completed">0</span></p>
                    <p>Pendientes: <span id="stat-pending">0</span></p>
                </div>
            </aside>
    </main>
    <footer>
        <p>&copy; 2026 TaskFlow - Practicas Corner</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
