<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Pro</title>
    <script>
        // Configuración de Tailwind para usar la clase 'dark'
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Definimos tu color lila principal para Tailwind
                        'brand-purple': '#9b59b6', 
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-300">

    <header class="bg-brand-purple dark:bg-[#7d3c98] text-white p-6 shadow-lg flex justify-between items-center">
        <h1 class="text-3xl font-bold">TaskFlow</h1>
        <button id="dark-mode-toggle" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-semibold transition-all flex items-center gap-2 border border-white/30">
            <span class="dark:hidden">🌙 Modo Oscuro</span>
            <span class="hidden dark:inline">☀️ Modo Claro</span>
        </button>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 flex flex-col md:flex-row gap-8">
        
        <div class="flex-1 space-y-6">
            
            <section class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="complete-all" class="flex-1  bg-[#2ecc71] hover:bg-[#27ae60] text-white py-3 rounded-xl font-bold transition-all">Marcar todas</button>
                    <button id="clear-completed" class="flex-1 bg-[#95a5a6] hover:bg-[#7f8c8d] text-white py-3 rounded-xl font-bold transition-all">Limpiar completadas</button>
                </div>
            </section>

            <section class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
                <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-5">Gestión de Tareas</h2>
                <form id="task-form" class="flex flex-col sm:flex-row gap-3">
                    <div class="flex-1">
                        <label for="task-input" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">Nueva tarea:</label>
                        <input type="text" id="task-input" placeholder="Escribe aquí..." required
                            class="w-full p-4 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 outline-none focus:ring-2 focus:ring-brand-purple focus:border-brand-purple transition-all">
                        <p id="task-error" class="mt-2 text-sm font-medium text-red-600 dark:text-red-400 hidden" role="status" aria-live="polite"></p>
                    </div>
                    <button type="submit" class="sm:self-end bg-brand-purple text-white px-8 py-4 rounded-xl font-bold hover:bg-[#8e44ad] transition-all">Añadir Tarea</button>
                </form>
            </section>

            <section class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
                <h2 class="text-2xl font-bold mb-5 text-gray-900 dark:text-gray-100">Tus Tareas</h2>
                <input type="text" id="search-input" placeholder="Buscar tarea..."
                    class="w-full p-4 mb-5 rounded-xl border-2 border-brand-purple/40 dark:border-brand-purple/50 dark:bg-gray-700 focus:ring-2 focus:ring-brand-purple focus:border-brand-purple outline-none transition-all">
                <div class="flex flex-wrap gap-2.5 mb-5">
                    <button id="filter-all" data-filter="all"
                        class="px-5 py-2.5 bg-purple-100 text-purple-700 rounded-xl text-sm font-semibold hover:bg-purple-200 transition-all dark:bg-purple-900/40 dark:text-purple-200">
                        Todas
                    </button>
                    <button id="filter-pending" data-filter="pending"
                        class="px-5 py-2.5 bg-purple-100 text-purple-700 rounded-xl text-sm font-semibold hover:bg-purple-200 transition-all dark:bg-purple-900/40 dark:text-purple-200">
                        Pendientes
                    </button>
                    <button id="filter-completed" data-filter="completed"
                        class="px-5 py-2.5 bg-purple-100 text-purple-700 rounded-xl text-sm font-semibold hover:bg-purple-200 transition-all dark:bg-purple-900/40 dark:text-purple-200">
                        Completadas
                    </button>
                </div>
                <ul id="task-list" class="space-y-4">
                    </ul>
                <div class="mt-5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                    <p id="pending-summary" class="text-sm font-medium text-gray-600 dark:text-gray-300">
                        Tienes 0 tareas pendientes
                    </p>
                    <button id="clear-completed-bottom"
                        class="sm:self-end bg-purple-100 text-purple-700 px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-purple-200 transition-all dark:bg-purple-900/40 dark:text-purple-200">
                        Limpiar completadas
                    </button>
                </div>
            </section>
        </div>

        <aside class="md:w-72 space-y-5">
            <div class="bg-white dark:bg-gray-800 p-7 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 sticky top-10">
                <h2 class="text-2xl font-bold mb-5 text-gray-900 dark:text-gray-100">Estadísticas</h2>
                <div class="space-y-4.5 text-gray-700 dark:text-gray-300">
                    <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                        <span>Total:</span>
                        <span id="stat-total" class="font-extrabold text-2xl text-brand-purple dark:text-[#af7ac5]">0</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                        <span>Completadas:</span>
                        <span id="stat-completed" class="font-extrabold text-2xl text-[#2ecc71]">0</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                        <span>Pendientes:</span>
                        <span id="stat-pending" class="font-extrabold text-2xl text-[#f39c12]">0</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <footer class="text-center p-10 mt-10 border-t border-gray-100 dark:border-gray-800 text-gray-500 dark:text-gray-400">
        <p>&copy; Hecho con ❤️ por Effy y Cursor.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
